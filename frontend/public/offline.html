<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Setu — offline</title>
    <style>
      html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
      body{display:grid;place-items:center;background:#fff7ed;color:#7c2d12;text-align:center;padding:24px}
      .badge{width:64px;height:64px;border-radius:18px;background:#ea7317;color:#fff;display:grid;place-items:center;font-size:28px;font-weight:700;margin:0 auto 16px}
      h1{font-size:20px;margin:0 0 8px}
      p{margin:0 0 4px;color:#9a3412;max-width:38ch}
      small{color:#c2410c}
    </style>
  </head>
  <body>
    <div>
      <div class="badge">से</div>
      <h1>Working offline</h1>
      <p>The Setu console keeps running without a network. Anything you record is
        saved on this device and will sync automatically when you reconnect.</p>
      <p><small>Reopen the app from the home screen — your queued cases are safe.</small></p>
    </div>
  </body>
</html>
